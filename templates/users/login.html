{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<section class="auth-shell">
    <div class="form-heading">
        <p class="eyebrow">Welcome Back</p>
        <h1>Login</h1>
    </div>

    <form class="form-panel" method="post">
        {% csrf_token %}
        {{ form.non_field_errors }}

        {% for field in form %}
            <label>
                <span>{{ field.label }}</span>
                {{ field }}
                {{ field.errors }}
            </label>
        {% endfor %}

        <button class="button button-wide" type="submit">Login</button>
        <p class="muted">Need an account? <a href="{% url 'signup-page' %}">Sign up</a></p>
    </form>
</section>
{% endblock %}
